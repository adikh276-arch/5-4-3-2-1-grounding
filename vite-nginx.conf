server {
    listen 80;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Proper subpath hosting
    location /5-4-3-2-1-grounding/ {
        alias /usr/share/nginx/html/5-4-3-2-1-grounding/;
        index index.html;
        try_files $uri $uri/ /5-4-3-2-1-grounding/index.html;
    }

    # Redirect root to subpath
    location = / {
        return 301 /5-4-3-2-1-grounding/;
    }

    # Catch-all to handle reverse proxy variations
    location / {
        root /usr/share/nginx/html/5-4-3-2-1-grounding;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /5-4-3-2-1-grounding/index.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
